# Tests a broad set of Quarto functionality that users are likely to encounter.
# A failure indicates some significant portion of functionality is likely to be broken.
name: Smoke Tests
on:
  workflow_call:
    inputs:
      buckets:
        description: "JSON string for buckets of tests to run in loop. Array of grouped tests. Empty means a full run."
        required: false
        type: string
        default: ""
      time-test:
        description: "Should we run tests to produce test file"
        required: false
        type: boolean
        default: false
      extra-r-packages:
        description: "extra R package to install for the runs (like a dev version of one of the deps) - comma separated, passed to renv::install"
        required: false
        type: string
        default: ""
      quarto-install:
        description: "Which quarto to test: 'dev' (source tree, default), 'release' (published release via quarto-actions/setup), or 'artifact' (built tarball from a workflow artifact)"
        required: false
        type: string
        default: "dev"
      quarto-version:
        description: "Version to install when quarto-install is 'release' (passed to quarto-dev/quarto-actions/setup)"
        required: false
        type: string
        default: ""
      quarto-artifact-name:
        description: "Workflow artifact name containing the built quarto tarball/zip when quarto-install is 'artifact'"
        required: false
        type: string
        default: ""
      quarto-artifact-run-id:
        description: "Workflow run id to download the artifact from (empty = the current run); lets a caller test artifacts built by another workflow run, e.g. a no-publish create-release build"
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref to check out (empty means the default checkout behavior)"
        required: false
        type: string
        default: ""
      runners:
        description: "JSON list of runner labels for the OS matrix. Policy: macos-latest is reserved for scheduled/built-version runs (test-smokes-built.yml nightly mode) - do NOT add it to per-commit callers (test-smokes-parallel.yml), which must stay fast."
        required: false
        type: string
        default: '["ubuntu-latest", "windows-latest"]'
  workflow_dispatch:
    inputs:
      buckets:
        description: "JSON string for buckets of tests to run in loop. Array of grouped tests."
        required: false
        type: string
        default: ""
      time-test:
        description: "Should we run tests to produce test file"
        required: false
        type: boolean
        default: false
      extra-r-packages:
        description: "extra R package to install for the runs (like a dev version of one of the deps) - comma separated, passed to renv::install"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 6 * * *"

# this is required to cleanup julia cache
permissions:
  actions: write
  contents: read

jobs:
  run-smokes:
    name: Run smoke (${{ matrix.os }})${{ matrix.time-test && ' with timed file' || ''}}${{ inputs.extra-r-packages && ' - with some extra R packages'|| ''}}
    if: github.event_name != 'schedule' || (github.event_name == 'schedule' && github.repository == 'quarto-dev/quarto-cli')
    strategy:
      fail-fast: false
      matrix:
        # inputs is empty on workflow_dispatch/schedule triggers; fall back to the historical default
        os: ${{ fromJSON(inputs.runners || '["ubuntu-latest", "windows-latest"]') }}
        time-test:
          - ${{ inputs.time-test }}
        exclude:
          # only run timed tests on Linux
          - os: windows-latest
            time-test: true
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright-browsers
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          # empty (the default) keeps the standard checkout behavior
          ref: ${{ inputs.ref }}

      - name: Fix temp dir to use runner one (windows)
        if: runner.os == 'Windows'
        run: |
          echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
          echo "TMP=${{ runner.temp }}" >> $GITHUB_ENV
          echo "TEMP=${{ runner.temp }}" >> $GITHUB_ENV
        shell: bash

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true
          # required to avoid rtools bin in path
          windows-path-include-rtools: false

      - name: Install node (for Playwright, MECA)
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Playwright setup is only needed when this job can actually run the
      # playwright suite: a bucket containing playwright-tests.test.ts, or a
      # full run (empty buckets, which includes integration/). Windows never
      # needs it: the suite is ignored on Windows CI (playwright-tests.test.ts,
      # `ignore: gha.isGitHubActions() && isWindows`).
      # Binary/release full runs (empty buckets, quarto-install != dev) default to the smoke/ corpus and never run playwright.
      - name: Cache multiplex server node_modules
        if: >-
          runner.os != 'Windows'
          && (contains(inputs.buckets, 'playwright-tests.test.ts')
              || (format('{0}', inputs.buckets) == ''
                  && (inputs.quarto-install == 'dev' || inputs.quarto-install == '')))
        uses: actions/cache@v5
        with:
          path: tests/integration/playwright/multiplex-server/node_modules
          key: ${{ runner.os }}-multiplex-server-${{ hashFiles('tests/integration/playwright/multiplex-server/package.json') }}
          restore-keys: |
            ${{ runner.os }}-multiplex-server-

      - name: Install node dependencies
        if: >-
          runner.os != 'Windows'
          && (contains(inputs.buckets, 'playwright-tests.test.ts')
              || (format('{0}', inputs.buckets) == ''
                  && (inputs.quarto-install == 'dev' || inputs.quarto-install == '')))
        run: npm install --loglevel=error --no-audit
        working-directory: ./tests/integration/playwright
        shell: bash

      - name: Get Playwright version
        if: >-
          runner.os != 'Windows'
          && (contains(inputs.buckets, 'playwright-tests.test.ts')
              || (format('{0}', inputs.buckets) == ''
                  && (inputs.quarto-install == 'dev' || inputs.quarto-install == '')))
        run: |
          VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "PLAYWRIGHT_VERSION=$VERSION" >> "$GITHUB_ENV"
        working-directory: ./tests/integration/playwright
        shell: bash

      - name: Cache Playwright browsers
        if: >-
          runner.os != 'Windows'
          && (contains(inputs.buckets, 'playwright-tests.test.ts')
              || (format('{0}', inputs.buckets) == ''
                  && (inputs.quarto-install == 'dev' || inputs.quarto-install == '')))
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright system dependencies
        if: >-
          runner.os != 'Windows'
          && (contains(inputs.buckets, 'playwright-tests.test.ts')
              || (format('{0}', inputs.buckets) == ''
                  && (inputs.quarto-install == 'dev' || inputs.quarto-install == '')))
        timeout-minutes: 15
        run: npx playwright install-deps
        working-directory: ./tests/integration/playwright

      - name: Install Playwright Browsers
        if: >-
          runner.os != 'Windows'
          && (contains(inputs.buckets, 'playwright-tests.test.ts')
              || (format('{0}', inputs.buckets) == ''
                  && (inputs.quarto-install == 'dev' || inputs.quarto-install == '')))
        timeout-minutes: 15
        run: npx playwright install
        working-directory: ./tests/integration/playwright

      - name: Install MECA validator
        if: ${{ runner.os != 'Windows' }}
        run: npm install -g meca --loglevel=error --no-audit

      - name: Set RENV_PATHS_ROOT
        shell: bash
        run: |
          echo "RENV_PATHS_ROOT=${{ runner.temp }}/renv" >> $GITHUB_ENV

      - name: Get R and OS version
        id: get-version
        run: |
          cat("os-version=", sessionInfo()$running, "\n", file = Sys.getenv("GITHUB_OUTPUT"), sep = "", append = TRUE)
          cat("r-version=", R.Version()$version.string, "\n", file = Sys.getenv("GITHUB_OUTPUT"), sep = "", append = TRUE)
        shell: Rscript {0}

      - name: Restore Renv package cache
        id: cache-renv-packages-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.RENV_PATHS_ROOT }}
            renv/library
          key: ${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-renv-2-${{ hashFiles('tests/renv.lock') }}
          restore-keys: |
            ${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-renv-2-

      - name: Install missing system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-openssl-dev
          sudo apt-get install -y libxml2-utils
          sudo apt-get install -y libharfbuzz-dev libfribidi-dev
          sudo apt-get install -y poppler-utils
          sudo apt-get install -y libnode-dev

      - name: Install rsvg-convert for SVG conversion tests
        # Only do it on linux runner, and only if we are running the relevant tests
        if: runner.os == 'Linux' && (format('{0}', inputs.buckets) == '' || contains(inputs.buckets, 'render-pdf-svg-conversion') || contains(inputs.buckets, 'pdf-standard'))
        run: |
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin

      - name: Install missing system deps (macOS)
        if: runner.os == 'macOS'
        # macos runners preinstall most toolchain deps; poppler (pdftotext/
        # pdftoppm) and librsvg (rsvg-convert) are the ones PDF tests need.
        # Tests requiring other optional tools prereq-skip gracefully.
        run: |
          brew install poppler librsvg

      - name: Restore R packages
        working-directory: tests
        run: |
          cat("::group::Installing renv if needed\n")
          if (!requireNamespace('renv', quietly = TRUE)) install.packages('renv')
          cat("::endgroup::\n")
          cat("::group::Restoring R packages from renv.lock\n")
          renv::restore()
          cat("::endgroup::\n")
          cat("::group::Verifying R packages are synchronized after restore\n")
          status <- renv::status()
          if (!isTRUE(status$synchronized)) {
            cat("::error::R packages are not synchronized after restore - some packages may have failed to install\n")
            quit(status = 1)
          }
          cat("::endgroup::\n")
          cat("::group::Installing dev versions of knitr and rmarkdown\n")
          # Install dev versions for our testing
          # Use r-universe to avoid github api calls
          try(install.packages('rmarkdown', repos = c('https://rstudio.r-universe.dev', getOption('repos'))))
          try(install.packages('knitr', repos = c('https://yihui.r-universe.dev', getOption('repos'))))
          cat("::endgroup::\n")
          if ('${{ inputs.extra-r-packages }}' != '') {
            cat(sprintf("::notice::Running with the following extra R packages for renv: %s\n", "${{ inputs.extra-r-packages }}"))
            cat("::group::Installing extra R packages\n")
            renv::install(strsplit("${{ inputs.extra-r-packages }}", split = ",")[[1]])
            cat("::endgroup::\n")
          }
        shell: Rscript {0}
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Show R session information
        working-directory: tests
        run: |
          # Session info
          cat("::group::Session info\n")
          renv::install("sessioninfo")
          sessioninfo::session_info(pkgs = "installed", include_base = TRUE)
          cat("::endgroup::\n")
        shell: Rscript {0}

      - name: Install uv for Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          enable-cache: true
          cache-dependency-glob: "tests/uv.lock"

      - name: Install Python and Dependencies
        working-directory: tests
        run: |
          uv sync --frozen

      # ALWAYS runs, in every quarto-install mode: it provisions the Deno runtime,
      # deno_cache and dev tree that the test harness itself needs. In non-dev modes
      # the quarto under test is layered on top via a PATH prepend + QUARTO_TEST_BIN.
      - uses: ./.github/workflows/actions/quarto-dev

      - name: Set up release quarto
        if: inputs.quarto-install == 'release'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ inputs.quarto-version }}

      - name: Download built quarto artifact
        if: inputs.quarto-install == 'artifact' && inputs.quarto-artifact-run-id == ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.quarto-artifact-name }}
          path: ${{ runner.temp }}/quarto-artifact

      - name: Download built quarto artifact (from another run)
        if: inputs.quarto-install == 'artifact' && inputs.quarto-artifact-run-id != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.quarto-artifact-name }}
          path: ${{ runner.temp }}/quarto-artifact
          run-id: ${{ inputs.quarto-artifact-run-id }}
          github-token: ${{ github.token }}

      - name: Install built quarto outside the checkout
        if: inputs.quarto-install == 'artifact'
        shell: bash
        # extraction must happen OUTSIDE the git checkout: the launcher detects a
        # sibling src/quarto.ts and would silently run dev mode (dev-mode trap)
        run: |
          mkdir -p "$RUNNER_TEMP/quarto-under-test"
          shopt -s nullglob
          artifacts=("$RUNNER_TEMP"/quarto-artifact/*.tar.gz "$RUNNER_TEMP"/quarto-artifact/*.zip)
          if [ "${#artifacts[@]}" -ne 1 ]; then
            echo "::error::expected exactly one .tar.gz or .zip in the quarto artifact, found: ${artifacts[*]:-none}"
            exit 1
          fi
          # layouts differ per artifact: the linux tarball has a
          # quarto-<version>/ top dir; the Mac tarball and Windows Zip are flat
          # ({bin,share} at the archive root). Extract, then flatten if needed.
          # bsdtar (windows/mac runners) also handles .zip via tar -xf.
          tar -xf "${artifacts[0]}" -C "$RUNNER_TEMP/quarto-under-test"
          if [ ! -d "$RUNNER_TEMP/quarto-under-test/bin" ]; then
            top="$(find "$RUNNER_TEMP/quarto-under-test" -mindepth 1 -maxdepth 1 -type d | head -1)"
            if [ -z "$top" ] || [ ! -d "$top/bin" ]; then
              echo "::error::could not locate bin/ in the extracted quarto artifact"
              exit 1
            fi
            mv "$top"/* "$RUNNER_TEMP/quarto-under-test"/
          fi
          echo "$RUNNER_TEMP/quarto-under-test/bin" >> "$GITHUB_PATH"

      - name: Pin and verify test target
        if: inputs.quarto-install != 'dev' && inputs.quarto-install != ''
        shell: bash
        run: |
          v="$(quarto --version)"
          echo "quarto under test: $v ($(command -v quarto))"
          if [ "$v" = "99.9.9" ]; then
            echo "::error::quarto on PATH reports the dev sentinel version 99.9.9 - the built/released quarto was not picked up (dev-mode trap)"
            exit 1
          fi
          # version-marker guard: version must be plain semver, optionally with build
          # metadata (+...). A '-prerelease' suffix or a 4th component would fail
          # every 'quarto-required' range check in the corpus (semver range gates).
          if ! echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::quarto version '$v' is not range-transparent semver (only build metadata '+...' is allowed; never a '-suffix' or a 4th component)"
            exit 1
          fi
          # preflight: the checked-out harness must support binary mode; older tags
          # (before tests/quarto-cmd.ts existed) cannot be tested in this mode
          if [ ! -f tests/quarto-cmd.ts ]; then
            echo "::error::this checkout's test harness lacks binary-mode support (tests/quarto-cmd.ts is missing); release/artifact mode only works for refs that include the QUARTO_TEST_BIN harness support"
            exit 1
          fi
          # resolve the executable path in a form Deno.Command can spawn:
          # on Windows, `command -v quarto` yields an extensionless bash-style
          # path (/c/...) that neither Test-Path nor Deno.Command can use —
          # prefer the real .exe/.cmd and convert to a native Windows path
          if [ "$RUNNER_OS" = "Windows" ]; then
            bin="$(command -v quarto.exe || command -v quarto.cmd || command -v quarto)"
            bin="$(cygpath -w "$bin")"
          else
            bin="$(command -v quarto)"
          fi
          echo "QUARTO_TEST_BIN=$bin" >> "$GITHUB_ENV"
          # when the caller pinned a concrete version, have the harness verify
          # every spawn targets exactly that version
          if [ -n "${{ inputs.quarto-version }}" ] \
            && [ "${{ inputs.quarto-version }}" != "pre-release" ] \
            && [ "${{ inputs.quarto-version }}" != "release" ]; then
            echo "QUARTO_TEST_EXPECTED_VERSION=${{ inputs.quarto-version }}" >> "$GITHUB_ENV"
          fi

      - name: Install Tinytex
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          quarto install tinytex

      - name: Install veraPDF for PDF standard validation
        if: runner.os == 'Linux' && (format('{0}', inputs.buckets) == '' || contains(inputs.buckets, 'pdf-standard'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          quarto install verapdf

      - name: Cache Typst packages
        id: cache-typst
        uses: ./.github/actions/cache-typst

      - name: Install Chrome Headless Shell
        run: |
          quarto install chrome-headless-shell --no-prompt

      - name: Setup Julia
        uses: julia-actions/setup-julia@a8c65a2a580b6a5cf30070e825e62f9fc0fee1d7
        id: setup-julia
        with:
          version: "1.12.6"

      - name: Load Julia packages from cache
        uses: julia-actions/cache@v3
        with:
          cache-name: julia-cache;workflow=${{ github.workflow }};job=${{ github.job }};julia=${{ steps.setup-julia.outputs.julia-version }}

      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3

      - name: Restore Julia Packages
        working-directory: tests
        shell: bash
        run: |
          # Setup IJulia with the jupyter from the Python environment
          # https://julialang.github.io/IJulia.jl/stable/manual/installation/
          export JUPYTER=$(find $(dirname $(uv run --frozen which jupyter))/ -type f -name "jupyter.exe" -o -name "jupyter")
          uv run --frozen julia --color=yes --project=. -e "import Pkg; Pkg.instantiate(); Pkg.build(\"IJulia\"); Pkg.precompile()"
          echo "Julia Jupyter:"
          uv run julia --project=. -e "import IJulia;println(IJulia.JUPYTER);println(IJulia.find_jupyter_subcommand(\"notebook\"))"

      - uses: ./.github/actions/merge-extension-tests

      - name: Setup timing file for timed test
        if: ${{ matrix.time-test == true }}
        run: |
          echo "QUARTO_TEST_TIMING=timing-for-ci.txt" >> "$GITHUB_ENV"

      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3

      - name: Run all Smoke Tests Windows
        if: ${{ runner.os == 'Windows' && format('{0}', inputs.buckets) == '' && matrix.time-test == false }}
        env:
          # Useful as TinyTeX latest release is checked in run-test.sh
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./run-tests.ps1
        working-directory: tests
        shell: pwsh

      - name: Run all Smoke Tests Linux
        if: ${{ runner.os != 'Windows' && format('{0}', inputs.buckets) == '' }}
        env:
          # Useful as TinyTeX latest release is checked in run-test.sh
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./run-tests.sh
        working-directory: tests
        shell: bash

      - name: Run Smoke Tests as a bucket on Linux
        if: ${{ runner.os != 'Windows' && format('{0}', inputs.buckets) != '' }}
        env:
          # Useful as TinyTeX latest release is checked in run-test.sh
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This loop owns the per-file ::group:: and ::error:: markers, so the
          # test harness must not also emit annotations for this step.
          QUARTO_TESTS_GHA_ORCHESTRATED: "1"
        run: |
          haserror=0
          failed_tests=()
          readarray -t my_array < <(echo '${{ inputs.buckets }}' | jq -rc '.[]')
          for file in "${my_array[@]}"; do
            echo "::group::Testing ${file}"
            echo ">>> ./run-tests.sh ${file}"
            # Run tests without -e so we don't exit on first failure
            set +e
            ./run-tests.sh "$file"
            status=$?
            set -e
            echo "::endgroup::"
            if [ $status -ne 0 ]; then
              echo "::error title=Test Bucket Failed::Test bucket ${file} failed with exit code ${status}"
              echo ">>> Error found in test file: ${file}"
              haserror=1
              failed_tests+=("$file")
            fi
          done
          if [ $haserror -eq 1 ]; then
            echo "---- FAILING TESTS SUMMARY ----"
            echo "    The following test buckets failed:"
            for failed in "${failed_tests[@]}"; do
              echo "    - $failed"
            done
            exit 1
          else
            echo ">>> All tests passed"
          fi
        working-directory: tests
        shell: bash

      - name: Run Smoke Tests as a bucket on Windows
        if: ${{ runner.os == 'Windows' && format('{0}', inputs.buckets) != '' }}
        env:
          # Useful as TinyTeX latest release is checked in run-test.sh
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This loop owns the per-file ::group:: and ::error:: markers, so the
          # test harness must not also emit annotations for this step.
          QUARTO_TESTS_GHA_ORCHESTRATED: "1"
        run: |
          $haserror=$false
          $failed_tests=@()
          foreach ($file in ('${{ inputs.buckets }}' | ConvertFrom-Json)) {
            Write-Host "::group::Testing ${file}"
            Write-Host ">>> ./run-tests.ps1 ${file}"
            ./run-tests.ps1 $file
            $status=$LASTEXITCODE
            Write-Host "::endgroup::"
            if ($status -ne 0) {
              Write-Host "::error title=Test Bucket Failed::Test bucket ${file} failed with exit code ${status}"
              Write-Host ">>> Error found in test file: ${file}"
              $haserror=$true
              $failed_tests+=$file
            }
          }
          if ($haserror) {
            Write-Host "---- FAILING TESTS SUMMARY ----"
            Write-Host "    The following test buckets failed:"
            foreach ($failed in $failed_tests) {
              Write-Host "    - $failed"
            }
            Exit 1
          } else {
            Write-Host ">>> All tests have passed"
          }
        working-directory: tests
        shell: pwsh

      - name: Upload test timing file
        uses: actions/upload-artifact@v7
        if: matrix.time-test
        with:
          name: timed test file
          path: tests/timing-for-ci.txt

      - name: Save Typst cache
        if: always() && steps.cache-typst.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ steps.cache-typst.outputs.cache-primary-key }}
          path: ${{ steps.cache-typst.outputs.cache-path }}

      - name: Save Renv package cache
        # don't save cache if we have extra R packages
        if: ${{ always() && steps.cache-renv-packages-restore.outputs.cache-hit != 'true' && inputs.extra-r-packages == '' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.RENV_PATHS_ROOT }}
            renv/library
          key: ${{ steps.cache-renv-packages-restore.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@v7
        # Upload playwright test report if it exists (the browser assertions
        # are ignored on Windows CI - see playwright-tests.test.ts). The name
        # includes the runner OS: several calls of this workflow can share one
        # workflow run (e.g. the per-OS playwright legs of
        # test-smokes-built.yml) and duplicate artifact names fail the upload.
        if: ${{ !cancelled() && runner.os != 'Windows' && hashFiles('tests/integration/playwright/playwright-report/**/*') != '' }}
        with:
          name: playwright-report-${{ runner.os }}
          path: ./tests/integration/playwright/playwright-report/
          retention-days: 30
